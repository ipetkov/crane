version: 2
updates:

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 10
  commit-message:
      prefix: "chore"
      include: "scope"
  cooldown:
    default-days: 7
- package-ecosystem: cargo
  directories:
    - "/examples/*"
    - "/pkgs/*"
  schedule:
    interval: monthly
  groups:
    cargo-deps:
      patterns:
        - "*"
  open-pull-requests-limit: 10
  commit-message:
      prefix: "chore"
      include: "scope"
  cooldown:
    default-days: 7
