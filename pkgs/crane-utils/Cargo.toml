[package]
name = "crane-utils"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
anyhow = "1"
serde_json = { version = "1", features = ["preserve_order"] }
serde = { version = "1", features = ["derive"] }
toml = { version = "1.1", features = ["display", "serde"] }
toml_edit = "0.25.3"

[dev-dependencies]
pretty_assertions = "1.3.0"
